<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GSEB AI Tutor</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#f4fff4;
}

header{
background:#0b8a43;
color:white;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:900px;
margin:25px auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
margin-bottom:20px;
}

h2{
color:#0b8a43;
}

select,input,button{
width:100%;
padding:14px;
margin-top:10px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
background:#0b8a43;
color:white;
border:none;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#066b33;
}

#answer{
margin-top:20px;
padding:15px;
background:#eefcf0;
border-radius:10px;
min-height:100px;
}

footer{
text-align:center;
padding:20px;
color:gray;
}

</style>

</head>

<body>

<header>

📚 GSEB AI Tutor

</header>

<div class="container">

<div class="card">

<h2>Select Subject</h2>

<select>

<option>Gujarati</option>

<option>Sanskrit</option>

<option>English</option>

</select>

<h2>Marks</h2>

<select>

<option>2 Marks</option>

<option>3 Marks</option>

<option>4 Marks</option>

<option>5 Marks</option>

</select>

<h2>Ask your Question</h2>

<input
type="text"
placeholder="Type your question here...">

<button>

Generate Answer

</button>

<div id="answer">

🤖 Your answer will appear here.

</div>

</div>

</div>

<footer>

Made with ❤️ by Shlesha

</footer>

</body>

</html>
